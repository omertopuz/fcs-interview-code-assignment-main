name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make maven wrapper executable
        run: chmod +x java-assignment/mvnw

      - name: Build and test java-assignment
        working-directory: java-assignment
        run: ./mvnw -B verify

      - name: Generate JaCoCo coverage report
        working-directory: java-assignment
        run: ./mvnw -B jacoco:report

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: java-assignment/target/site/jacoco/
          retention-days: 14

      - name: Add coverage to PR comment
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: java-assignment/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage Report
          update-comment: true

      - name: Coverage summary
        working-directory: java-assignment
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/site/jacoco/index.html ]; then
            # Extract coverage percentage from JaCoCo report
            COVERAGE=$(grep -oP 'Total[^%]*\K[0-9]+%' target/site/jacoco/index.html | head -1 || echo "N/A")
            echo "**Line Coverage:** $COVERAGE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Full report available in workflow artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated." >> $GITHUB_STEP_SUMMARY
          fi
